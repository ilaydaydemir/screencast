<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screencast</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  -webkit-user-select: none; user-select: none;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 6px;
}
.toolbar {
  display: flex;
  align-items: center;
  gap: 2px;
  background: rgba(20,20,20,0.96);
  border-radius: 12px;
  padding: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.btn {
  width: 34px; height: 34px;
  border: none; background: transparent;
  color: #fff; cursor: pointer;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.btn:hover { background: rgba(255,255,255,0.15); }
.stop-btn { background: #ef4444; width: 40px; height: 34px; }
.stop-btn:hover { background: #dc2626; }
.timer {
  color: #fff; font-size: 13px; font-weight: 700;
  font-variant-numeric: tabular-nums; padding: 0 8px;
  min-width: 40px; text-align: center;
}
.divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); margin: 0 2px; }
.bubble {
  width: 120px; height: 120px;
  border-radius: 50%;
  overflow: hidden;
  background: #222;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,255,255,0.9);
}
.bubble video {
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  display: block;
}
.bubble.no-cam { display: none; }
</style>
</head>
<body>
  <div class="bubble" id="bubble-wrap">
    <video id="webcam" autoplay playsinline muted></video>
  </div>
  <div class="toolbar">
    <button class="btn stop-btn" id="stop-btn" title="Stop">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10" rx="2"/></svg>
    </button>
    <div class="timer" id="timer">0:00</div>
    <div class="divider"></div>
    <button class="btn" id="pause-btn" title="Pause">
      <svg id="pause-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="5" x2="8" y2="19"/><line x1="16" y1="5" x2="16" y2="19"/></svg>
    </button>
    <button class="btn" id="discard-btn" title="Discard">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
