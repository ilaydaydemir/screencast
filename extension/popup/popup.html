<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 260px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #111; color: #fff;
}
.header {
  padding: 14px 16px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid #1e1e1e;
}
.dot { width: 14px; height: 14px; background: #ef4444; border-radius: 50%; flex-shrink: 0; }
.app-name { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }

#login-view { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
#login-view p { font-size: 12px; color: #666; }
input {
  width: 100%; padding: 9px 11px;
  background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 7px; color: #fff; font-size: 13px; outline: none;
}
input:focus { border-color: #3a3a3a; }
.err { font-size: 11px; color: #f87171; display: none; min-height: 14px; }

#main-view { display: none; padding: 14px 16px; flex-direction: column; gap: 10px; }
.user-row { display: flex; align-items: center; justify-content: space-between; }
.user-email { font-size: 11px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
.btn-out { font-size: 11px; color: #444; background: none; border: none; cursor: pointer; padding: 3px 7px; border-radius: 4px; }
.btn-out:hover { color: #888; background: #1a1a1a; }

.btn {
  width: 100%; padding: 11px;
  border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.btn-red { background: #ef4444; color: #fff; }
.btn-red:hover { background: #dc2626; }
.btn-red:disabled { background: #3a3a3a; color: #666; cursor: not-allowed; }
.btn-ghost { background: #1a1a1a; color: #777; border: 1px solid #2a2a2a; }
.btn-ghost:hover { border-color: #3a3a3a; color: #ccc; }
.note { font-size: 11px; color: #444; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div class="dot"></div>
  <span class="app-name">Basic Record</span>
</div>

<div id="login-view">
  <p>Sign in to record & share</p>
  <input type="email" id="email" placeholder="Email" autocomplete="email" />
  <input type="password" id="pwd" placeholder="Password" />
  <div class="err" id="err"></div>
  <button class="btn btn-red" id="signin-btn">Sign In</button>
</div>

<div id="main-view">
  <div class="user-row">
    <span class="user-email" id="u-email"></span>
    <button class="btn-out" id="out-btn">Sign out</button>
  </div>
  <button class="btn btn-red" id="rec-btn">⏺ &nbsp;Start Recording</button>
  <button class="btn btn-ghost" id="dash-btn">My Recordings</button>
  <div class="note">Screen + mic → shareable link</div>
</div>

<script src="popup.js"></script>
</body>
</html>
