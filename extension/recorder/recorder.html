<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Basic Record</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: #0a0a0a; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.card {
  width: 340px;
  background: #111; border: 1px solid #1e1e1e;
  border-radius: 16px; padding: 28px 24px;
  display: flex; flex-direction: column; gap: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.logo { display: flex; align-items: center; gap: 8px; }
.dot { width: 14px; height: 14px; background: #ef4444; border-radius: 50%; }
.app-name { font-size: 14px; font-weight: 700; }

.status-row { display: flex; align-items: center; gap: 10px; }
.rec-pulse {
  width: 10px; height: 10px; background: #ef4444; border-radius: 50%;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-text { font-size: 13px; color: #aaa; }
.timer { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

.btn {
  width: 100%; padding: 12px;
  border: none; border-radius: 9px;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-red { background: #ef4444; color: #fff; }
.btn-red:hover { background: #dc2626; }
.btn-red:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
.btn-ghost { background: #1a1a1a; color: #777; border: 1px solid #2a2a2a; }
.btn-ghost:hover:not(:disabled) { border-color: #3a3a3a; color: #ccc; }
.btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

.progress-wrap { background: #1a1a1a; border-radius: 6px; height: 6px; overflow: hidden; }
.progress-bar { height: 100%; background: #ef4444; width: 0%; transition: width 0.3s; border-radius: 6px; }

.link-box {
  background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 8px; padding: 10px 12px;
  font-size: 12px; color: #4ade80; word-break: break-all;
  cursor: pointer; user-select: all;
}
.link-box:hover { border-color: #3a3a3a; }
.copy-note { font-size: 11px; color: #444; text-align: center; }

#state-idle {}
#state-recording { display: none; }
#state-uploading { display: none; }
#state-done { display: none; }
#state-error { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="dot"></div>
    <span class="app-name">Basic Record</span>
  </div>

  <!-- IDLE -->
  <div id="state-idle">
    <p style="font-size:13px;color:#666;margin-bottom:14px;">Click to pick what to record (screen, window, or tab).</p>
    <button class="btn btn-red" id="start-btn">⏺ &nbsp;Start Recording</button>
  </div>

  <!-- RECORDING -->
  <div id="state-recording">
    <div class="status-row">
      <div class="rec-pulse"></div>
      <span class="status-text">Recording…</span>
    </div>
    <div class="timer" id="timer">0:00</div>
    <button class="btn btn-red" id="stop-btn">⏹ &nbsp;Stop & Save</button>
    <button class="btn btn-ghost" id="cancel-btn" style="margin-top:6px;">Discard</button>
  </div>

  <!-- UPLOADING -->
  <div id="state-uploading">
    <p style="font-size:13px;color:#aaa;">Uploading…</p>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <p style="font-size:11px;color:#555;">Please keep this tab open</p>
  </div>

  <!-- DONE -->
  <div id="state-done">
    <p style="font-size:13px;color:#4ade80;font-weight:600;">✓ &nbsp;Recording saved!</p>
    <div class="link-box" id="share-link"></div>
    <div class="copy-note" id="copy-note">Click link to copy</div>
    <button class="btn btn-red" id="open-btn" style="margin-top:4px;">Open Recording →</button>
    <button class="btn btn-ghost" id="again-btn" style="margin-top:6px;">Record Again</button>
  </div>

  <!-- ERROR -->
  <div id="state-error">
    <p style="font-size:13px;color:#f87171;font-weight:600;">Something went wrong</p>
    <p style="font-size:12px;color:#555;" id="err-msg"></p>
    <button class="btn btn-red" id="retry-btn" style="margin-top:8px;">Try Again</button>
  </div>
</div>

<script src="recorder.js"></script>
</body>
</html>
